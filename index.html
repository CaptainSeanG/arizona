<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arizona LED Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap');
html,body{width:100%;height:100%}
body{margin:0;background:#0b1220;color:#fff;font-family:sans-serif;overflow:hidden}
body.kiosk{cursor:none}
#wrap{width:100vw;height:100vh;position:relative}
svg{width:100%;height:100%;background:#020617;display:block}
.led-core{stroke:#000;stroke-width:.5;transition:fill .45s ease,opacity .45s ease,r .45s ease}
.led-glow{filter:url(#glow);opacity:.9;transition:fill .6s ease,opacity .6s ease,r .6s ease}
@keyframes flicker{0%{opacity:.85}50%{opacity:1}100%{opacity:.9}}
.flicker{animation:flicker 2s infinite ease-in-out}
.outline{fill:none;stroke:#64748b;stroke-width:3;vector-effect:non-scaling-stroke}
.label{fill:#e5eefc;font-size:20px;font-weight:700;paint-order:stroke;stroke:#020617;stroke-width:4px;stroke-linejoin:round}
.label-small{font-size:16px}
.clock-box{fill:rgba(2,6,23,.78);stroke:#64748b;stroke-width:2}
.clock-title{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
.clock-time{fill:#f8fafc;font-family:'Orbitron',sans-serif;font-size:34px;font-weight:800;letter-spacing:2px}
.clock-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px}
#tooltip{position:absolute;display:none;pointer-events:none;max-width:360px;background:rgba(2,6,23,.96);color:#e5eefc;border:1px solid #64748b;border-radius:10px;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.45);font-size:14px;line-height:1.35;z-index:20}
#tooltip .tip-id{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#93c5fd;margin-bottom:4px}
#tooltip .tip-raw{white-space:normal}
#hud{position:absolute;right:22px;bottom:22px;display:flex;gap:10px;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s ease}
body.show-metar-hud #hud{opacity:1;pointer-events:auto}
.hud-btn{appearance:none;border:1px solid rgba(148,163,184,.45);background:rgba(2,6,23,.72);color:#e5eefc;border-radius:12px;padding:10px 14px;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px}
#homePanel{position:absolute;left:22px;bottom:22px;width:240px;background:rgba(2,6,23,.78);border:1px solid rgba(148,163,184,.45);border-radius:14px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:30}
#homeControls{display:flex;gap:8px;align-items:center;margin-bottom:10px}
#homeControls label{font-family:'Orbitron',sans-serif;font-size:11px;color:#93c5fd;letter-spacing:1px}
#homeAirportInput{width:86px;background:rgba(15,23,42,.9);color:#e5eefc;border:1px solid rgba(148,163,184,.4);border-radius:8px;padding:6px 8px;font-family:'Orbitron',sans-serif;font-size:12px;text-transform:uppercase}
#homeCompass{width:216px;height:216px;display:block;margin:0 auto}
.compass-ring{fill:rgba(15,23,42,.55);stroke:#64748b;stroke-width:2}
.compass-tick{stroke:rgba(148,163,184,.6);stroke-width:2}
.compass-card{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;text-anchor:middle}
.compass-arrow{fill:#22c55e;opacity:.9}
.compass-text{fill:#e5eefc;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;text-anchor:middle}
.compass-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;text-anchor:middle}
.stale .led-glow,.stale .led-core{animation:staleBlink 1.1s infinite steps(1)}
@keyframes staleBlink{0%,49%{opacity:1}50%,100%{opacity:.25}}
#welcomeOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,6,23,.88);z-index:50}
#welcomeOverlay.show{display:flex}
#welcomeCard{width:min(92vw,480px);background:rgba(15,23,42,.96);border:1px solid rgba(148,163,184,.35);border-radius:18px;padding:24px;box-shadow:0 18px 40px rgba(0,0,0,.5)}
.welcome-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:800;color:#f8fafc;letter-spacing:2px;margin-bottom:8px}
.welcome-sub{color:#cbd5e1;line-height:1.45;margin-bottom:18px}
.welcome-row{display:flex;gap:10px;align-items:center}
#welcomeInput{flex:1;background:rgba(2,6,23,.95);color:#e5eefc;border:1px solid rgba(148,163,184,.45);border-radius:10px;padding:12px 14px;font-family:'Orbitron',sans-serif;font-size:16px;text-transform:uppercase}
#welcomeBtn{border:1px solid rgba(34,197,94,.45);background:rgba(34,197,94,.14);color:#dcfce7;border-radius:10px;padding:12px 16px;font-family:'Orbitron',sans-serif;font-size:14px;cursor:pointer}
#welcomeError{min-height:18px;color:#fca5a5;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div id="wrap">
<svg viewBox="0 0 1118 1196"><defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="map"></g><g id="dots"></g><g id="clocks"></g></svg>
<div id="tooltip"></div>
<div id="homePanel"><div id="homeControls"><label>HOME</label><input id="homeAirportInput" maxlength="4"/></div><svg id="homeCompass" viewBox="0 0 216 216"></svg></div>
<div id="hud"><button id="metarStatusBtn" class="hud-btn">METAR: STARTING</button></div>
<div id="welcomeOverlay"><div id="welcomeCard"><div class="welcome-title">ARIZONA WX MAP</div><div class="welcome-sub">Enter your home airport once</div><div class="welcome-row"><input id="welcomeInput" maxlength="4" placeholder="KPHX"/><button id="welcomeBtn">START</button></div><div id="welcomeError"></div></div></div>
</div>
<script>
const airports=[{id:'KPHX',lat:33.434,lon:-112.012,cat:'VFR'},{id:'KDVT',lat:33.688,lon:-112.083,cat:'VFR'},{id:'KSDL',lat:33.623,lon:-111.911,cat:'VFR'}];
const colors={VFR:'#22c55e',MVFR:'#3b82f6',IFR:'#ef4444',LIFR:'#d946ef'};
const map=document.getElementById('map');
const dots=document.getElementById('dots');
const clocks=document.getElementById('clocks');
const tooltip=document.getElementById('tooltip');
const metarStatusBtn=document.getElementById('metarStatusBtn');
const homeAirportInput=document.getElementById('homeAirportInput');
const homeCompass=document.getElementById('homeCompass');
const welcomeOverlay=document.getElementById('welcomeOverlay');
const welcomeInput=document.getElementById('welcomeInput');
const welcomeBtn=document.getElementById('welcomeBtn');
const welcomeError=document.getElementById('welcomeError');
const metarById=new Map();
let homeAirportId=(localStorage.getItem('homeAirportId')||'');

function draw(){map.innerHTML='<rect width="100%" height="100%" fill="#020617"/>';drawDots();}
function drawDots(){dots.innerHTML='';airports.forEach(a=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',200+Math.random()*400);c.setAttribute('cy',200+Math.random()*400);c.setAttribute('r',8);c.setAttribute('fill',colors[a.cat]);dots.appendChild(c);});}

async function fetchMetars(){try{const res=await fetch('./metars.json');const data=await res.json();metarStatusBtn.textContent='METAR OK '+data.length;}catch(e){metarStatusBtn.textContent='METAR FAIL';}}

function startApp(){welcomeOverlay.classList.remove('show');draw();fetchMetars();}
function init(){if(!homeAirportId){welcomeOverlay.classList.add('show')}else startApp();}

welcomeBtn.onclick=()=>{const v=welcomeInput.value.trim().toUpperCase();if(!v){welcomeError.textContent='enter airport';return;}homeAirportId=v;localStorage.setItem('homeAirportId',v);startApp();};
welcomeInput.addEventListener('keydown',e=>{if(e.key==='Enter')welcomeBtn.click()});

init();
</script>
</body>
</html>
