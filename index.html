<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arizona WX Map</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap');

body {
  margin:0;
  background:#020617;
  color:white;
  overflow:hidden;
  font-family:sans-serif;
}

#wrap { width:100vw; height:100vh; position:relative; }

svg { width:100%; height:100%; }

.label {
  fill:#e5eefc;
  font-size:18px;
  font-weight:700;
  stroke:#020617;
  stroke-width:3;
}

.led-glow {
  filter:url(#glow);
  opacity:.9;
}

.led-core {
  stroke:black;
  stroke-width:.5;
}

.stale .led-core,
.stale .led-glow {
  animation:blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.2; }
}

#tooltip {
  position:absolute;
  display:none;
  background:#020617;
  border:1px solid #64748b;
  padding:8px;
  border-radius:8px;
}

#homePanel {
  position:absolute;
  left:20px;
  bottom:20px;
  background:#020617cc;
  padding:10px;
  border-radius:10px;
}

#homeTitle {
  text-align:center;
  font-family:'Orbitron';
  font-size:12px;
  color:#93c5fd;
}

#welcomeOverlay {
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:black;
}

#welcomeOverlay.show {
  display:flex;
}
</style>
</head>

<body>

<div id="wrap">

<svg viewBox="0 0 1118 1196">
<defs>
<filter id="glow">
<feGaussianBlur stdDeviation="6"/>
</filter>
</defs>

<g id="map"></g>
<g id="dots"></g>
</svg>

<div id="tooltip"></div>

<div id="homePanel">
  <div id="homeTitle">HOME AIRPORT WIND</div>
  <svg id="homeCompass" width="200" height="200"></svg>
</div>

<div id="welcomeOverlay">
  <div>
    <input id="welcomeInput" placeholder="KPHX"/>
    <button id="welcomeBtn">START</button>
    <div id="welcomeError"></div>
  </div>
</div>

</div>

<script>

const airports = [
  {id:'KPHX',lat:33.434,lon:-112.012,cat:'VFR'},
  {id:'KDVT',lat:33.688,lon:-112.083,cat:'VFR'},
  {id:'KTUS',lat:32.116,lon:-110.941,cat:'VFR'}
];

const colors = {
  VFR:'#22c55e',
  MVFR:'#3b82f6',
  IFR:'#ef4444',
  LIFR:'#d946ef'
};

const dots = document.getElementById('dots');
const tooltip = document.getElementById('tooltip');

const metarById = new Map();
const metarRecordById = new Map();

let homeAirportId = localStorage.getItem('homeAirportId') || '';

function project(lat,lon){
  return {
    x:300 + (lon+112)*200,
    y:600 - (lat-33)*200
  };
}

function drawDots(){
  dots.innerHTML='';
  airports.forEach(a=>{
    const p = project(a.lat,a.lon);

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    if(a.stale) g.classList.add('stale');

    const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('cx',p.x);
    glow.setAttribute('cy',p.y);
    glow.setAttribute('r',12);
    glow.setAttribute('fill',colors[a.cat]);

    const core = document.createElementNS('http://www.w3.org/2000/svg','circle');
    core.setAttribute('cx',p.x);
    core.setAttribute('cy',p.y);
    core.setAttribute('r',5);
    core.setAttribute('fill',colors[a.cat]);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x',p.x+8);
    label.setAttribute('y',p.y-8);
    label.setAttribute('class','label');
    label.textContent = a.id;

    g.appendChild(glow);
    g.appendChild(core);

    g.addEventListener('mouseenter',()=>showTooltip(a.id));
    g.addEventListener('mouseleave',()=>tooltip.style.display='none');

    dots.appendChild(g);
    dots.appendChild(label);
  });
}

function showTooltip(id){
  const raw = metarById.get(id) || `${id} NO CURRENT METAR`;
  tooltip.innerHTML = raw;
  tooltip.style.display='block';
  tooltip.style.left='20px';
  tooltip.style.top='20px';
}

function extractRawMetar(item){
  return item.rawOb || item.raw_text || item.rawText || item.raw || '';
}

function parseObsTime(record){
  const raw = extractRawMetar(record);
  const m = raw.match(/(\d{2})(\d{2})(\d{2})Z/);

  if(m){
    const now = new Date();
    return new Date(Date.UTC(
      now.getUTCFullYear(),
      now.getUTCMonth(),
      Number(m[1]),
      Number(m[2]),
      Number(m[3])
    ));
  }
  return null;
}

async function fetchMetars(){
  try{
    const res = await fetch('./metars.json?t='+Date.now());
    const data = await res.json();

    airports.forEach(a=>a.stale=false);

    data.forEach(item=>{
      const id = item.icaoId;
      const airport = airports.find(a=>a.id===id);
      if(!airport) return;

      const raw = extractRawMetar(item);
      if(raw) metarById.set(id,raw);

      const obs = parseObsTime(item);
      if(obs){
        airport.stale = (Date.now()-obs.getTime()) > 150*60*1000;
      }
    });

    drawDots();

  }catch(e){
    console.error(e);
  }
}

function startApp(){
  document.getElementById('welcomeOverlay').classList.remove('show');
  drawDots();
  fetchMetars();
}

function init(){
  if(!homeAirportId){
    document.getElementById('welcomeOverlay').classList.add('show');
  } else {
    startApp();
  }
}

document.getElementById('welcomeBtn').onclick = ()=>{
  const v = document.getElementById('welcomeInput').value.toUpperCase();
  if(!v){ return; }
  homeAirportId = v;
  localStorage.setItem('homeAirportId',v);
  startApp();
};

init();

</script>

</body>
</html>
