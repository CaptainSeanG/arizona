<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arizona LED Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap');
html,body{width:100%;height:100%}
body{margin:0;background:#0b1220;color:#fff;overflow:hidden;font-family:Inter,Arial,sans-serif}
body.kiosk{cursor:none}
#wrap{width:100vw;height:100vh;position:relative}
svg{width:100%;height:100%;display:block;background:radial-gradient(circle at top,#0f1b31 0%,#08111f 42%,#020617 100%)}
.outline{fill:none;stroke:#64748b;stroke-width:3;vector-effect:non-scaling-stroke}
.led-group{pointer-events:all}
.led-core{stroke:#000;stroke-width:.6;transition:fill .45s ease,opacity .45s ease,r .45s ease}
.led-glow{filter:url(#glow);opacity:.88;transition:fill .6s ease,opacity .6s ease,r .6s ease}
.label{fill:#e5eefc;font-size:20px;font-weight:700;paint-order:stroke;stroke:#020617;stroke-width:4px;stroke-linejoin:round;user-select:none}
.label-small{font-size:16px}
.clock-box{fill:rgba(2,6,23,.78);stroke:#64748b;stroke-width:2}
.clock-title{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
.clock-time{fill:#f8fafc;font-family:'Orbitron',sans-serif;font-size:42px;font-weight:800;letter-spacing:2px;text-anchor:start}
.clock-meridiem{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;text-anchor:end}
.clock-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px}
#windToggle{
  position:absolute;
  left:0;
  top:0;
  width:278px;
  height:38px;
  border:1px solid rgba(249,115,22,.55);
  background:rgba(0,0,0,.88);
  color:#f97316;
  border-radius:999px;
  font-family:'Orbitron',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:1px;
  z-index:30;
}
#windToggle.is-off{
  background:rgba(0,0,0,.58);
  color:rgba(249,115,22,.55);
  border-color:rgba(249,115,22,.32);
}
#tooltip{position:absolute;display:none;pointer-events:none;max-width:360px;background:rgba(2,6,23,.96);color:#e5eefc;border:1px solid #64748b;border-radius:10px;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.45);font-size:14px;line-height:1.35;z-index:20}
#tooltip .tip-id{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#93c5fd;margin-bottom:4px}
#tooltip .tip-raw{white-space:normal}
#tooltip .tip-summary{white-space:normal;color:#f59e0b}
#hud{position:absolute;right:22px;bottom:22px;display:flex;gap:10px;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s ease}
body.show-metar-hud #hud{opacity:1;pointer-events:auto}
.hud-btn{appearance:none;border:1px solid rgba(148,163,184,.45);background:rgba(2,6,23,.72);color:#e5eefc;border-radius:12px;padding:10px 14px;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px}
#homePanel{
  position:absolute;
  left:22px;
  bottom:22px;
  width:236px;
  background:linear-gradient(180deg,rgba(1,4,14,.95),rgba(2,6,23,.96));
  border:1px solid rgba(148,163,184,.45);
  border-radius:14px;
  padding:8px 8px 10px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  z-index:30;
  cursor:pointer;
}
body.hide-windsock #homePanel{display:none}
#homeTitle{font-family:'Orbitron',sans-serif;font-size:12px;color:#93c5fd;letter-spacing:1px;margin-bottom:4px;text-align:center}
#homeCompass{width:220px;height:300px;display:block;margin:0 auto;background:transparent}
.windsock-mast{stroke:#94a3b8;stroke-width:7;stroke-linecap:round}
.windsock-boom{stroke:#e2e8f0;stroke-width:4;stroke-linecap:round}
.windsock-base{fill:rgba(51,65,85,.9);stroke:#94a3b8;stroke-width:2}
.windsock-hinge{fill:#f8fafc;stroke:#64748b;stroke-width:2}
.windsock-ground{stroke:rgba(51,65,85,.9);stroke-width:3;stroke-linecap:round}
.windsock-ring{fill:rgba(15,23,42,.35);stroke:rgba(148,163,184,.35);stroke-width:2}
.windsock-ring-inner{fill:none;stroke:rgba(148,163,184,.18);stroke-width:1.5}
.windsock-tick{stroke:rgba(148,163,184,.55);stroke-width:2}
.windsock-card{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;text-anchor:middle}
.windsock-segment-orange{fill:#f97316}
.windsock-segment-white{fill:#fff7ed}
.windsock-outline{fill:none;stroke:rgba(15,23,42,.65);stroke-width:1}
.windsock-airport{fill:#f8fafc;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800;text-anchor:middle;letter-spacing:1px}
.windsock-copy{fill:#e5eefc;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}
.windsock-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;text-anchor:middle;letter-spacing:1px}
.windsock-status{fill:#f8fafc;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;text-anchor:middle;letter-spacing:1px}
.windsock-badge{stroke-width:1.5}
.windsock-rig{animation:sockRigWave var(--wave-ms,1400ms) ease-in-out infinite;transform-origin:0 0}
.windsock-segment{animation:sockCloth var(--cloth-ms,720ms) ease-in-out infinite alternate;transform-origin:0 0}
.windsock-tail{animation:sockTail var(--tail-ms,560ms) ease-in-out infinite alternate;transform-origin:0 0}
.stale .led-glow,.stale .led-core{animation:staleBlink 1.1s infinite steps(1)}
.missing .led-glow,.missing .led-core{animation:missingPulse 1.8s ease-in-out infinite}
@keyframes staleBlink{0%,49%{opacity:1}50%,100%{opacity:.22}}
@keyframes missingPulse{0%,100%{opacity:.22}50%{opacity:1}}
@keyframes sockRigWave{
  0%,100%{transform:rotate(calc(var(--sway,4deg) * -1))}
  50%{transform:rotate(var(--sway,4deg))}
}
@keyframes sockCloth{
  0%{transform:translateY(calc(var(--flutter,2px) * -1)) rotate(calc(var(--bend,3deg) * -1))}
  100%{transform:translateY(var(--flutter,2px)) rotate(var(--bend,3deg))}
}
@keyframes sockTail{
  0%{transform:translateY(calc(var(--tail-drop,3px) * -1)) rotate(calc(var(--tail-bend,7deg) * -1))}
  100%{transform:translateY(var(--tail-drop,3px)) rotate(var(--tail-bend,7deg))}
}
#welcomeOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.86);z-index:50}
#welcomeOverlay.show{display:flex}
#welcomeCard{width:min(92vw,500px);background:rgba(15,23,42,.98);border:1px solid rgba(148,163,184,.35);border-radius:18px;padding:24px;box-shadow:0 18px 40px rgba(0,0,0,.5)}
.welcome-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:800;color:#f8fafc;letter-spacing:2px;margin-bottom:8px}
.welcome-sub{color:#cbd5e1;line-height:1.45;margin-bottom:18px}
.welcome-row{display:flex;gap:10px;align-items:center}
#welcomeInput{flex:1;background:rgba(2,6,23,.95);color:#e5eefc;border:1px solid rgba(148,163,184,.45);border-radius:10px;padding:12px 14px;font-family:'Orbitron',sans-serif;font-size:16px;text-transform:uppercase}
#welcomeBtn{border:1px solid rgba(34,197,94,.45);background:rgba(34,197,94,.14);color:#dcfce7;border-radius:10px;padding:12px 16px;font-family:'Orbitron',sans-serif;font-size:14px;cursor:pointer}
#welcomeError{min-height:18px;color:#fca5a5;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div id="wrap">
  <svg viewBox="0 0 1118 1196" aria-label="Arizona LED map">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
    <g id="map"></g>
    <g id="dots"></g>
    <g id="clocks"></g>
  </svg>
  <div id="tooltip"></div>
  <button id="windToggle" type="button">WINDSOCK</button>
  <div id="homePanel">
    <div id="homeTitle">HOME AIRPORT WINDSOCK</div>
    <svg id="homeCompass" viewBox="0 0 246 266" aria-label="Home airport windsock"></svg>
  </div>
  <div id="hud">
    <button id="metarStatusBtn" class="hud-btn" type="button">METAR: STARTING</button>
  </div>
  <div id="welcomeOverlay">
    <div id="welcomeCard">
      <div class="welcome-title">ARIZONA WX MAP</div>
      <div class="welcome-sub">Enter your home airport once. We’ll save it and drop you straight into kiosk mode next time.</div>
      <div class="welcome-row">
        <input id="welcomeInput" maxlength="4" placeholder="KPHX" />
        <button id="welcomeBtn" type="button">START</button>
      </div>
      <div id="welcomeError"></div>
    </div>
  </div>
</div>
<script>
const airports=[
{id:'KPHX',lat:33.434,lon:-112.012,cat:'VFR',dx:-5,dy:24,center:true},
{id:'KDVT',lat:33.688,lon:-112.083,cat:'MVFR',dx:-3,dy:-18},
{id:'KSDL',lat:33.623,lon:-111.911,cat:'IFR',dx:10,dy:-10},
{id:'KFFZ',lat:33.460,lon:-111.728,cat:'LIFR',dx:12,dy:2},
{id:'KIWA',lat:33.307,lon:-111.655,cat:'VFR',dx:12,dy:18},
{id:'KCHD',lat:33.270,lon:-111.812,cat:'VFR',dx:-5,dy:26,center:true},
{id:'KGYR',lat:33.423,lon:-112.375,cat:'VFR',dx:-5,dy:26,center:true},
{id:'KGEU',lat:33.527,lon:-112.295,cat:'VFR',dx:0,dy:-10},
{id:'KLUF',lat:33.535,lon:-112.383,cat:'VFR',dx:-44,dy:0},
{id:'KTUS',lat:32.117,lon:-110.938,cat:'VFR',dx:10,dy:-10},
{id:'KDUG',lat:31.469,lon:-109.604,cat:'VFR',dx:10,dy:-10},
{id:'KOLS',lat:31.417,lon:-110.848,cat:'VFR',dx:10,dy:-10},
{id:'KPGA',lat:36.926,lon:-111.448,cat:'VFR',dx:14,dy:6},
{id:'KFLG',lat:35.140,lon:-111.669,cat:'VFR',dx:10,dy:-10},
{id:'KINW',lat:35.021,lon:-110.723,cat:'VFR',dx:10,dy:-10},
{id:'KPRC',lat:34.654,lon:-112.419,cat:'VFR',dx:10,dy:-10},
{id:'KGCN',lat:35.952,lon:-112.147,cat:'VFR',dx:10,dy:-10},
{id:'KSEZ',lat:34.848,lon:-111.788,cat:'VFR',dx:10,dy:-10},
{id:'KSOW',lat:34.265,lon:-110.006,cat:'VFR',dx:10,dy:-10},
{id:'KSAD',lat:32.854,lon:-109.635,cat:'VFR',dx:10,dy:-10},
{id:'KSJN',lat:34.519,lon:-109.379,cat:'VFR',dx:10,dy:-10},
{id:'KIGM',lat:35.259,lon:-113.938,cat:'VFR',dx:10,dy:-10},
{id:'KHII',lat:34.571,lon:-114.358,cat:'VFR',dx:10,dy:-10},
{id:'KIFP',lat:35.157,lon:-114.560,cat:'VFR',dx:10,dy:-10},
{id:'KNYL',lat:32.6566,lon:-114.606,cat:'VFR',dx:5,dy:31},
{id:'KRYN',lat:32.1427,lon:-111.174,cat:'VFR',dx:-26,dy:29},
{id:'KCGZ',lat:32.9550,lon:-111.767,cat:'VFR',dx:10,dy:-10}
];

const colors={VFR:'#22c55e',MVFR:'#3b82f6',IFR:'#ef4444',LIFR:'#d946ef',NONE:'#6b7280'};

const imageOutline=[[1026.0,1170.5],[684.0,1170.5],[629.0,1152.5],[588.0,1133.5],[564.0,1128.5],[541.0,1116.5],[520.0,1112.5],[494.0,1099.5],[449.0,1086.5],[415.0,1070.5],[383.0,1062.5],[345.0,1044.5],[306.0,1034.5],[268.0,1016.5],[247.0,1012.5],[223.0,1000.5],[168.0,984.5],[143.0,970.5],[121.0,966.5],[86.0,948.5],[59.0,942.5],[55.5,939.0],[55.5,913.0],[64.5,906.0],[73.5,887.0],[101.0,885.5],[103.5,873.0],[109.5,863.0],[105.5,836.0],[82.0,830.5],[73.5,822.0],[72.5,813.0],[78.5,789.0],[69.5,777.0],[73.5,768.0],[70.5,755.0],[85.0,748.5],[93.5,735.0],[97.5,716.0],[106.5,696.0],[101.5,676.0],[101.5,656.0],[115.5,623.0],[122.0,613.5],[134.0,605.5],[141.0,605.5],[166.5,580.0],[166.5,571.0],[150.0,559.5],[123.5,531.0],[109.5,489.0],[81.5,451.0],[85.5,423.0],[84.5,408.0],[91.5,404.0],[91.5,377.0],[87.5,357.0],[75.5,333.0],[80.5,306.0],[71.5,286.0],[71.5,267.0],[77.5,248.0],[65.5,230.0],[63.5,214.0],[72.0,202.5],[81.0,197.5],[102.0,193.5],[126.0,193.5],[153.0,220.5],[159.0,221.5],[165.5,216.0],[183.5,187.0],[183.0,13.5],[1026.5,16.0],[1028.5,1168.0],[1026.0,1170.5]];
const azOutline=[[-114.816,32.493],[-114.808,32.650],[-114.800,32.800],[-114.790,32.950],[-114.770,33.120],[-114.750,33.260],[-114.730,33.420],[-114.710,33.580],[-114.690,33.740],[-114.670,33.900],[-114.650,34.060],[-114.630,34.200],[-114.610,34.340],[-114.600,34.450],[-114.590,34.550],[-114.580,34.650],[-114.560,34.780],[-114.540,34.920],[-114.510,35.050],[-114.480,35.180],[-114.450,35.320],[-114.420,35.450],[-114.390,35.600],[-114.360,35.750],[-114.330,35.900],[-114.300,36.050],[-114.270,36.200],[-114.240,36.350],[-114.210,36.500],[-114.180,36.650],[-114.150,36.800],[-114.120,36.900],[-114.100,37.000],[-112.500,37.000],[-111.000,37.000],[-109.045,37.000],[-109.045,35.500],[-109.045,34.000],[-109.045,32.600],[-109.045,31.332],[-110.500,31.400],[-111.250,31.520],[-112.000,31.700],[-112.700,31.900],[-113.300,32.080],[-113.850,32.220],[-114.250,32.330],[-114.816,32.493]];

const map=document.getElementById('map');
const dots=document.getElementById('dots');
const clocks=document.getElementById('clocks');
const tooltip=document.getElementById('tooltip');
const windToggle=document.getElementById('windToggle');
const metarStatusBtn=document.getElementById('metarStatusBtn');
const homeTitle=document.getElementById('homeTitle');
const homeCompass=document.getElementById('homeCompass');
const welcomeOverlay=document.getElementById('welcomeOverlay');
const welcomeInput=document.getElementById('welcomeInput');
const welcomeBtn=document.getElementById('welcomeBtn');
const welcomeError=document.getElementById('welcomeError');

const metarById=new Map();
const metarRecordById=new Map();

let homeAirportId=(localStorage.getItem('homeAirportId')||'').toUpperCase();
let liveMetarStatus='STARTING';
let lastMetarError='';
let lastMetarUpdatedAt=null;
let showMetarHud=false;
let showWindsock=true;
let kioskMode=false;
let clockIntervalId=null;
let metarIntervalId=null;
let compassIntervalId=null;
const CLOCK_LAYOUT={x:748,width:348,boxHeight:102,box1Y:40,box2Y:156};

function svgEl(name,attrs={},text=''){
  const el=document.createElementNS('http://www.w3.org/2000/svg',name);
  Object.entries(attrs).forEach(([key,val])=>el.setAttribute(key,val));
  if(text) el.textContent=text;
  return el;
}

function albersAZ(lat,lon){
  const phi=lat*Math.PI/180,lambda=lon*Math.PI/180,phi1=29.5*Math.PI/180,phi2=45.5*Math.PI/180,phi0=34.2*Math.PI/180,lambda0=-111.7*Math.PI/180;
  const n=.5*(Math.sin(phi1)+Math.sin(phi2)),c=Math.cos(phi1)**2+2*n*Math.sin(phi1),rho=Math.sqrt(c-2*n*Math.sin(phi))/n,rho0=Math.sqrt(c-2*n*Math.sin(phi0))/n,theta=n*(lambda-lambda0);
  return{x:rho*Math.sin(theta),y:rho0-rho*Math.cos(theta)};
}

function computeBounds(points){
  const projected=points.map(([lon,lat])=>albersAZ(lat,lon));
  return{
    minX:Math.min(...projected.map(p=>p.x)),
    maxX:Math.max(...projected.map(p=>p.x)),
    minY:Math.min(...projected.map(p=>p.y)),
    maxY:Math.max(...projected.map(p=>p.y))
  };
}

const projBounds=computeBounds(azOutline);
const imageBounds={
  minX:Math.min(...imageOutline.map(p=>p[0])),
  maxX:Math.max(...imageOutline.map(p=>p[0])),
  minY:Math.min(...imageOutline.map(p=>p[1])),
  maxY:Math.max(...imageOutline.map(p=>p[1]))
};

function getDisplayAgeMinutes(record,airport){
  const primary=
    airport&&airport.obsDate instanceof Date&&!isNaN(airport.obsDate.getTime())
      ? airport.obsDate
      : (record?parseObsTime(record):null);

  if(primary instanceof Date&&!isNaN(primary.getTime())){
    const ageMs=Date.now()-primary.getTime();
    if(ageMs>=0&&ageMs<=24*60*60*1000){
      return Math.round(ageMs/60000);
    }
  }

  if(lastMetarUpdatedAt){
    const fallback=new Date(lastMetarUpdatedAt);
    if(!isNaN(fallback.getTime())){
      const ageMs=Date.now()-fallback.getTime();
      if(ageMs>=0&&ageMs<=24*60*60*1000){
        return Math.round(ageMs/60000);
      }
    }
  }

  return null;
}

function project(lat,lon){
  const p=albersAZ(lat,lon);
  const nx=(p.x-projBounds.minX)/(projBounds.maxX-projBounds.minX);
  const ny=(p.y-projBounds.minY)/(projBounds.maxY-projBounds.minY);
  return{
    x:imageBounds.minX+nx*(imageBounds.maxX-imageBounds.minX),
    y:imageBounds.maxY-ny*(imageBounds.maxY-imageBounds.minY)
  };
}

function updateHudButtons(){
  document.body.classList.toggle('show-metar-hud',showMetarHud);
  document.body.classList.toggle('hide-windsock',!showWindsock);
  windToggle.classList.toggle('is-off',!showWindsock);
  const updatedLabel=lastMetarUpdatedAt
    ? ` - ${new Date(lastMetarUpdatedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC',hour12:false})}Z`
    : '';
  metarStatusBtn.textContent=lastMetarError
    ? `METAR: ${liveMetarStatus} (${lastMetarError})`
    : `METAR: ${liveMetarStatus}${updatedLabel}`;
}

function toggleWindsock(){
  showWindsock=!showWindsock;
  updateHudButtons();
}

function drawMap(){
  map.innerHTML='';
  let path='';
  imageOutline.forEach(([x,y],i)=>{path+=`${i===0?'M':'L'} ${x} ${y} `;});
  path+='Z';
  const outline=svgEl('path',{d:path,class:'outline'});
  map.appendChild(outline);
}

function getAirportDisplayColor(airport){
  if(!metarRecordById.has(airport.id)) return colors.NONE;
  return colors[airport.cat]||colors.VFR;
}

function drawDots(){
  dots.innerHTML='';
  const denseIds=new Set(['KPHX','KDVT','KSDL','KFFZ','KCHD','KGEU','KLUF','KGYR','KIWA','KRYN','KCGZ']);
  airports.forEach(a=>{
    const p=project(a.lat,a.lon);
    const isMissing=!metarRecordById.has(a.id);
    const classes=['led-group'];
    if(a.stale) classes.push('stale');
    if(isMissing) classes.push('missing');
    const g=svgEl('g',{class:classes.join(' ')});
    g.dataset.airportId=a.id;
    const dotColor=getAirportDisplayColor(a);

    const glow=svgEl('circle',{cx:p.x,cy:p.y,r:14,fill:dotColor,class:'led-glow'});
    const core=svgEl('circle',{cx:p.x,cy:p.y,r:5,fill:dotColor,class:'led-core'});
    const label=svgEl('text',{
      x:p.x+(a.dx||10),
      y:p.y+(a.dy||-10),
      class:denseIds.has(a.id)?'label label-small':'label'
    },a.id);
    if(a.center||(a.dx||0)===0) label.setAttribute('text-anchor','middle');

    g.appendChild(glow);
    g.appendChild(core);
    dots.appendChild(g);
    dots.appendChild(label);
  });
  attachTooltipHandlers();
}

function drawClocks(){
  clocks.innerHTML='';
  const now=new Date();
  const zulu=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC',hour12:false});
  const localParts=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).split(' ');
  const localTime=localParts[0]||'';
  const localMeridiem=localParts[1]||'';
  const updatedZulu=lastMetarUpdatedAt
    ? new Date(lastMetarUpdatedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC',hour12:false})+'Z'
    : 'WAITING';

  const panel=svgEl('g');
  const clockX=CLOCK_LAYOUT.x;
  const boxWidth=CLOCK_LAYOUT.width;
  const box1Y=CLOCK_LAYOUT.box1Y;
  const box2Y=CLOCK_LAYOUT.box2Y;
  const boxHeight=CLOCK_LAYOUT.boxHeight;
  const box1=svgEl('rect',{x:clockX,y:box1Y,rx:18,ry:18,width:boxWidth,height:boxHeight,class:'clock-box'});
  const box2=svgEl('rect',{x:clockX,y:box2Y,rx:18,ry:18,width:boxWidth,height:boxHeight,class:'clock-box'});
  panel.appendChild(box1);
  panel.appendChild(svgEl('text',{x:clockX+25,y:box1Y+34,class:'clock-title'},'ZULU'));
  panel.appendChild(svgEl('text',{x:clockX+25,y:box1Y+72,class:'clock-time'},zulu));
  panel.appendChild(svgEl('text',{x:clockX+25,y:box1Y+94,class:'clock-sub'},`UPDATED ${updatedZulu}`));
  panel.appendChild(box2);
  panel.appendChild(svgEl('text',{x:clockX+25,y:box2Y+34,class:'clock-title'},'LOCAL'));
  panel.appendChild(svgEl('text',{x:clockX+25,y:box2Y+72,class:'clock-time'},localTime));
  panel.appendChild(svgEl('text',{x:clockX+boxWidth-24,y:box2Y+67,class:'clock-meridiem'},localMeridiem));
  clocks.appendChild(panel);
  positionWindToggle();
}

function positionWindToggle(){
  const wrapRect=document.getElementById('wrap').getBoundingClientRect();
  const viewWidth=1118;
  const viewHeight=1196;
  const scale=Math.min(wrapRect.width/viewWidth,wrapRect.height/viewHeight);
  const offsetX=(wrapRect.width-viewWidth*scale)/2;
  const offsetY=(wrapRect.height-viewHeight*scale)/2;
  const buttonWidth=278;
  const buttonHeight=38;
  const left=offsetX+CLOCK_LAYOUT.x*scale;
  const top=offsetY+(CLOCK_LAYOUT.box2Y+CLOCK_LAYOUT.boxHeight+30)*scale;
  windToggle.style.left=`${Math.round(left)}px`;
  windToggle.style.top=`${Math.round(top)}px`;
  windToggle.style.width=`${Math.round(buttonWidth*scale)}px`;
  windToggle.style.height=`${Math.round(buttonHeight*scale)}px`;
}

function getFallbackMetar(airport){
  return `${airport.id} NO CURRENT METAR`;
}

function extractAirportId(item){
  return String(item.icaoId||item.stationId||item.icaoid||item.icao||item.id||'').toUpperCase();
}

function extractRawMetar(item){
  return item.rawOb||item.raw_text||item.rawText||item.raw||item.metar||'';
}

function parseObsTime(record){
  const candidates=[record.obsTime,record.observation_time,record.reportTime,record.report_time,record.obsTimeUtc].filter(Boolean);
  for(const value of candidates){
    const d=new Date(value);
    if(!Number.isNaN(d.getTime())) return d;
  }

  const raw=record.rawOb||record.raw_text||record.rawText||record.raw||'';
  const m=String(raw).match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
  if(m){
    const now=new Date();
    const d=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),Number(m[1]),Number(m[2]),Number(m[3]),0));
    if(d.getTime()>now.getTime()+6*3600000) d.setUTCMonth(d.getUTCMonth()-1);
    return d;
  }

  return null;
}

function isStaleObs(obsDate){
  if(!obsDate) return false;
  const ageMs=Date.now()-obsDate.getTime();
  if(ageMs<0) return false;
  if(ageMs>36*3600000) return false;
  return ageMs>60*60*1000;
}

function extractWind(record){
  const dir=record.wdir!==undefined?record.wdir:(record.windDir!==undefined?record.windDir:record.wind_direction);
  const speed=record.wspd!==undefined?record.wspd:(record.windSpeed!==undefined?record.windSpeed:record.wind_speed_kt);
  const gust=record.wgst!==undefined?record.wgst:(record.windGust!==undefined?record.windGust:record.wind_gust_kt);
  return{dir,speed,gust};
}

function showTooltip(airportId,clientX,clientY){
  const airport=airports.find(a=>a.id===airportId);
  if(!airport) return;

  const raw=metarById.get(airportId)||getFallbackMetar(airport);
  const record=metarRecordById.get(airportId);
  const category=record?(record.fltCat||record.flightCategory||record.flight_category||airport.cat):airport.cat;
  const visibility=record&&(record.visib||record.visibility||record.vis||record.prevail_vis_sm);
  const tempC=record&&(record.temp!==undefined?record.temp:record.tempC);
  const tempF=(tempC!==undefined&&tempC!==null&&tempC!=='')?Math.round((Number(tempC)*9/5)+32):null;
  const clouds=record&&Array.isArray(record.clouds)&&record.clouds.length?record.clouds[0]:null;

  const decodedParts=[category];
  if(visibility) decodedParts.push(`${visibility}SM`);
  if(clouds&&(clouds.cover||clouds.base)) decodedParts.push(`${clouds.cover||''}${clouds.base||''}`);
  if(tempF!==null&&Number.isFinite(tempF)) decodedParts.push(`${tempF}°F`);
  if(airport.obsDate instanceof Date&&!isNaN(airport.obsDate.getTime())){
    const ageMs=Date.now()-airport.obsDate.getTime();
    if(ageMs>=0&&ageMs<=24*60*60*1000){
      decodedParts.push(`${Math.round(ageMs/60000)}m old`);
    }
  }
  if(airport.stale) decodedParts.push('STALE');

  const decoded=record?decodedParts.join(' • '):(airport.stale?`${airport.cat} • STALE`:'');
  tooltip.innerHTML=
    `<div class="tip-id">${airportId}</div>`+
    `${decoded?`<div class="tip-summary">${decoded}</div>`:''}`+
    `<div class="tip-raw">${raw}</div>`;
  tooltip.style.display='block';

  const margin=14;
  const wrapRect=document.getElementById('wrap').getBoundingClientRect();
  const tipRect=tooltip.getBoundingClientRect();
  let left=clientX-wrapRect.left+margin;
  let top=clientY-wrapRect.top+margin;
  if(left+tipRect.width>wrapRect.width-margin) left=clientX-wrapRect.left-tipRect.width-margin;
  if(top+tipRect.height>wrapRect.height-margin) top=clientY-wrapRect.top-tipRect.height-margin;
  left=Math.max(margin,left);
  top=Math.max(margin,top);
  tooltip.style.left=`${left}px`;
  tooltip.style.top=`${top}px`;
}

function hideTooltip(){ tooltip.style.display='none'; }

function attachTooltipHandlers(){
  dots.querySelectorAll('g[data-airport-id]').forEach(node=>{
    node.addEventListener('mouseenter',e=>showTooltip(node.dataset.airportId,e.clientX,e.clientY));
    node.addEventListener('mousemove',e=>showTooltip(node.dataset.airportId,e.clientX,e.clientY));
    node.addEventListener('mouseleave',hideTooltip);
  });
}

function buildSockSegment(group,startX,width,startHeight,endHeight,cls,style=''){
  const segment=svgEl('g',{class:'windsock-segment',style});
  const poly=svgEl('polygon',{
    points:`${startX},${-startHeight/2} ${startX+width},${-endHeight/2} ${startX+width},${endHeight/2} ${startX},${startHeight/2}`,
    class:cls
  });
  const outline=svgEl('polygon',{
    points:`${startX},${-startHeight/2} ${startX+width},${-endHeight/2} ${startX+width},${endHeight/2} ${startX},${startHeight/2}`,
    class:'windsock-outline'
  });
  segment.appendChild(poly);
  segment.appendChild(outline);
  group.appendChild(segment);
}

function getSockSegmentCount(speed){
  const windSpeed=Math.max(0,Number(speed)||0);
  if(windSpeed < 5) return 1;
  if(windSpeed < 9) return 2;
  if(windSpeed <= 11) return 3;
  if(windSpeed <= 15) return 4;
  return 5;
}

function drawHomeCompass(){
  homeCompass.innerHTML='';
  const airport=airports.find(a=>a.id===homeAirportId);
  const record=metarRecordById.get(homeAirportId);
  const ageMin=getDisplayAgeMinutes(record,airport);
  const badgeColor=airport?getAirportDisplayColor(airport):colors.NONE;
  const badgeStroke=airport&&badgeColor!==colors.NONE?'rgba(255,255,255,.22)':'rgba(148,163,184,.35)';
  const badgeTextColor=badgeColor===colors.VFR?'#020617':'#f8fafc';

  homeTitle.textContent=airport?`HOME AIRPORT WINDSOCK`:'HOME AIRPORT WINDSOCK';

  homeCompass.appendChild(svgEl('circle',{cx:123,cy:114,r:90,class:'windsock-ring'}));
  homeCompass.appendChild(svgEl('circle',{cx:123,cy:114,r:66,class:'windsock-ring-inner'}));
  homeCompass.appendChild(svgEl('circle',{cx:123,cy:114,r:4,fill:'#f8fafc',stroke:'rgba(15,23,42,.65)','stroke-width':'1.2'}));
  [['N',0],['E',90],['S',180],['W',270]].forEach(([label,deg])=>{
    const rad=(deg-90)*Math.PI/180;
    const tx=123+Math.cos(rad)*75;
    const ty=114+Math.sin(rad)*70+4;
    homeCompass.appendChild(svgEl('text',{x:tx,y:ty,class:'windsock-card'},label));
  });
  for(let deg=0;deg<360;deg+=30){
    const rad=(deg-90)*Math.PI/180;
    const x1=123+Math.cos(rad)*78;
    const y1=114+Math.sin(rad)*78;
    const x2=123+Math.cos(rad)*88;
    const y2=114+Math.sin(rad)*88;
    homeCompass.appendChild(svgEl('line',{x1,y1,x2,y2,class:'windsock-tick'}));
  }
  homeCompass.appendChild(svgEl('text',{x:123,y:-8,class:'windsock-airport'},homeAirportId||'----'));

  const statusBadge=svgEl('rect',{
    x:194,y:20,width:52,height:20,rx:10,ry:10,class:'windsock-badge',
    fill:badgeColor,
    stroke:badgeStroke
  });
  const statusText=svgEl('text',{x:220,y:34,class:'windsock-status',fill:badgeTextColor},airport?airport.cat:'WAITING');
  homeCompass.appendChild(statusBadge);
  homeCompass.appendChild(statusText);

  if(!airport||!record){
    homeCompass.appendChild(svgEl('text',{x:138,y:108,class:'windsock-copy'},'NO WIND DATA'));
    homeCompass.appendChild(svgEl('text',{x:138,y:128,class:'windsock-sub'},'WAITING FOR METAR'));
    return;
  }

  const {dir,speed,gust}=extractWind(record);
  if(dir===undefined||dir===null||speed===undefined||speed===null){
    homeCompass.appendChild(svgEl('text',{x:138,y:108,class:'windsock-copy'},'NO WIND DATA'));
    homeCompass.appendChild(svgEl('text',{x:138,y:128,class:'windsock-sub'},airport.stale?'STALE METAR':'NO WIND FIELD'));
    return;
  }

  if(dir==='VRB'){
    homeCompass.appendChild(svgEl('text',{x:138,y:104,class:'windsock-copy'},`VRB ${speed}KT`));
    homeCompass.appendChild(svgEl('text',{x:138,y:126,class:'windsock-sub'},airport.stale?'STALE METAR':'VARIABLE WIND'));
    return;
  }

  const windDir=Number(dir);
  const windSpeed=Math.max(0,Number(speed)||0);
  const gustSpeed=Math.max(windSpeed,Number(gust)||0);
  const gustDelta=Math.max(0,gustSpeed-windSpeed);

  if(windSpeed===0){
    homeCompass.appendChild(svgEl('text',{x:123,y:114,class:'windsock-copy'},'NO WIND'));
    homeCompass.appendChild(svgEl('text',{x:123,y:256,class:'windsock-sub'},ageMin===null?(airport.stale?'STALE METAR':'NO AGE DATA'):`${ageMin} MIN${ageMin===1?'':'S'} AGO`));
    return;
  }

  const segmentCount=getSockSegmentCount(windSpeed);
  const calmFactor=Math.min(1,windSpeed/12);
  const intensity=Math.min(1,(windSpeed*0.35+gustDelta*1.1)/28);
  const streamAngle=(windDir+90)%360;
  const swayDeg=(0.5+calmFactor*1.6+gustDelta*0.08).toFixed(2);
  const flutterPx=(0.18+calmFactor*0.72+gustDelta*0.09).toFixed(2);
  const bendDeg=(0.8+calmFactor*1.9+gustDelta*0.12).toFixed(2);
  const tailBend=(1.4+calmFactor*2.7+gustDelta*0.15).toFixed(2);
  const waveMs=Math.round(2350-intensity*650);
  const clothMs=Math.round(1080-intensity*180);
  const tailMs=Math.round(840-intensity*120);

  const anchor=svgEl('g',{transform:'translate(123 114)'});
  const motion=svgEl('g',{
    class:'windsock-rig',
    style:`--sway:${swayDeg}deg;--wave-ms:${waveMs}ms`
  });
  const rotated=svgEl('g',{transform:`rotate(${streamAngle})`});
  const segments=svgEl('g');
  const segmentDefs=[
    {startX:10,width:18,startHeight:16,endHeight:14,cls:'windsock-segment-orange',flutter:0,bend:0,ms:0},
    {startX:26,width:16,startHeight:14,endHeight:12,cls:'windsock-segment-white',flutter:0.08,bend:0.25,ms:30},
    {startX:40,width:15,startHeight:12,endHeight:10,cls:'windsock-segment-orange',flutter:0.14,bend:0.45,ms:60},
    {startX:53,width:14,startHeight:10,endHeight:8,cls:'windsock-segment-white',flutter:0.2,bend:0.65,ms:90},
    {startX:65,width:13,startHeight:8,endHeight:6,cls:'windsock-segment-orange',flutter:0.26,bend:0.9,ms:120}
  ];
  segmentDefs.slice(0,segmentCount).forEach(def=>{
    buildSockSegment(
      segments,
      def.startX,
      def.width,
      def.startHeight,
      def.endHeight,
      def.cls,
      `--flutter:${(Number(flutterPx)+def.flutter).toFixed(2)}px;--bend:${(Number(bendDeg)+def.bend).toFixed(2)}deg;--cloth-ms:${clothMs+def.ms}ms`
    );
  });

  const tail=svgEl('g',{
    class:'windsock-tail',
    style:`--tail-drop:${(Number(flutterPx)+0.75).toFixed(2)}px;--tail-bend:${tailBend}deg;--tail-ms:${tailMs}ms`
  });
  const tailStart=segmentDefs[Math.max(0,segmentCount-1)].startX+segmentDefs[Math.max(0,segmentCount-1)].width-1;
  const tailEnd=tailStart+12;
  const tailPoly=svgEl('polygon',{
    points:`${tailStart},-2.5 ${tailEnd},-1.3 ${tailEnd},1.3 ${tailStart},2.5`,
    class:'windsock-segment-white'
  });
  const tailOutline=svgEl('polygon',{
    points:`${tailStart},-2.5 ${tailEnd},-1.3 ${tailEnd},1.3 ${tailStart},2.5`,
    class:'windsock-outline'
  });
  tail.appendChild(tailPoly);
  tail.appendChild(tailOutline);

  rotated.appendChild(segments);
  rotated.appendChild(tail);
  motion.appendChild(rotated);
  anchor.appendChild(motion);
  homeCompass.appendChild(anchor);

  const windCopy=`${String(windDir).padStart(3,'0')} DEG ${windSpeed}KT${gust?` G${gust}`:''}`;
  const ageCopy=ageMin===null?(airport.stale?'STALE METAR':'NO AGE DATA'):`${ageMin} MIN${ageMin===1?'':'S'} AGO`;
  const gustCopy=gust&&Number(gust)>windSpeed?`GUSTING TO ${gust}KT`:'';

  homeCompass.appendChild(svgEl('text',{x:123,y:248,class:'windsock-copy'},windCopy));
  homeCompass.appendChild(svgEl('text',{x:123,y:269,class:'windsock-sub'},ageCopy));
  if(gustCopy){
    homeCompass.appendChild(svgEl('text',{x:123,y:286,class:'windsock-sub'},gustCopy));
  }
}

async function fetchMetars(){
  const url=`./metars.json?t=${Date.now()}`;
  liveMetarStatus='FETCHING';
  lastMetarError='';
  updateHudButtons();

  try{
    const response=await fetch(url,{cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);

    const payload=await response.json();
    const data=Array.isArray(payload)?payload:(Array.isArray(payload.data)?payload.data:null);
    if(!data) throw new Error('BAD SHAPE');

    metarById.clear();
    metarRecordById.clear();
    airports.forEach(a=>{a.stale=false;});

    data.forEach(item=>{
      const id=extractAirportId(item);
      const raw=extractRawMetar(item);
      const category=item.fltCat||item.flightCategory||item.flight_category;
      if(!id) return;

      const airport=airports.find(a=>a.id===id);
      if(airport&&category&&colors[category]) airport.cat=category;
      if(raw) metarById.set(id,raw);
      metarRecordById.set(id,item);
      if(airport){
        const obs=parseObsTime(item);
        airport.stale=isStaleObs(obs);
        airport.obsDate=obs;
      }
    });

    liveMetarStatus=metarById.size?`CACHE ${metarById.size}`:'NO RAW';
    lastMetarUpdatedAt=new Date().toISOString();
    drawDots();
    drawHomeCompass();
    drawClocks();
    updateHudButtons();
  }catch(error){
    liveMetarStatus='FALLBACK';
    lastMetarError=error.message||'UNKNOWN';
    lastMetarUpdatedAt=null;
    updateHudButtons();
    console.error('Cached METAR load failed',error);
  }
}

function draw(){
  drawMap();
  drawDots();
  drawClocks();
  drawHomeCompass();
}

function stopIntervals(){
  if(clockIntervalId) clearInterval(clockIntervalId);
  if(metarIntervalId) clearInterval(metarIntervalId);
  if(compassIntervalId) clearInterval(compassIntervalId);
  clockIntervalId=null;
  metarIntervalId=null;
  compassIntervalId=null;
}

function startApp(){
  stopIntervals();
  welcomeOverlay.classList.remove('show');
  draw();
  fetchMetars();
  clockIntervalId=setInterval(drawClocks,1000);
  metarIntervalId=setInterval(fetchMetars,5*60*1000);
  compassIntervalId=setInterval(drawHomeCompass,60000);
}

function initWelcome(){
  if(!homeAirportId) welcomeOverlay.classList.add('show');
  else startApp();
}

windToggle.addEventListener('click',toggleWindsock);

welcomeBtn.addEventListener('click',()=>{
  const val=welcomeInput.value.trim().toUpperCase();
  if(!airports.some(a=>a.id===val)){
    welcomeError.textContent='Enter a valid Arizona airport from this map';
    return;
  }
  homeAirportId=val;
  localStorage.setItem('homeAirportId',val);
  welcomeError.textContent='';
  startApp();
});

welcomeInput.addEventListener('keydown',e=>{
  if(e.key==='Enter') welcomeBtn.click();
});

document.addEventListener('keydown',async e=>{
  if(e.target===welcomeInput) return;

  if(e.key==='m'||e.key==='M'){
    showMetarHud=!showMetarHud;
    updateHudButtons();
  }

  if(e.key==='w'||e.key==='W'){
    toggleWindsock();
  }

  if(e.key==='f'||e.key==='F'){
    try{
      if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    }catch(err){
      console.warn(err);
    }
  }

  if(e.key==='k'||e.key==='K'){
    kioskMode=!kioskMode;
    document.body.classList.toggle('kiosk',kioskMode);
  }

  if(e.key==='Escape'&&kioskMode){
    kioskMode=false;
    document.body.classList.remove('kiosk');
  }
});

document.getElementById('homePanel').addEventListener('click',()=>{
  stopIntervals();
  welcomeOverlay.classList.add('show');
  welcomeInput.value=homeAirportId||'';
  setTimeout(()=>welcomeInput.focus(),50);
});

window.addEventListener('resize',positionWindToggle);

initWelcome();
</script>
