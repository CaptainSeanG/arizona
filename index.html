<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arizona LED Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap');
html,body{width:100%;height:100%}
body{margin:0;background:#0b1220;color:#fff;overflow:hidden;font-family:Inter,Arial,sans-serif}
body.kiosk{cursor:none}
#wrap{width:100vw;height:100vh;position:relative}
svg{width:100%;height:100%;display:block;background:radial-gradient(circle at top,#0f1b31 0%,#08111f 42%,#020617 100%)}
.outline{fill:none;stroke:#64748b;stroke-width:3;vector-effect:non-scaling-stroke}
.led-group{pointer-events:all}
.led-core{stroke:#000;stroke-width:.6;transition:fill .45s ease,opacity .45s ease,r .45s ease}
.led-glow{filter:url(#glow);opacity:.88;transition:fill .6s ease,opacity .6s ease,r .6s ease}
.label{fill:#e5eefc;font-size:20px;font-weight:700;paint-order:stroke;stroke:#020617;stroke-width:4px;stroke-linejoin:round;user-select:none}
.label-small{font-size:16px}
.clock-box{fill:rgba(2,6,23,.78);stroke:#64748b;stroke-width:2}
.clock-title{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
.clock-time{fill:#f8fafc;font-family:'Orbitron',sans-serif;font-size:34px;font-weight:800;letter-spacing:2px}
.clock-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px}
#tooltip{position:absolute;display:none;pointer-events:none;max-width:360px;background:rgba(2,6,23,.96);color:#e5eefc;border:1px solid #64748b;border-radius:10px;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.45);font-size:14px;line-height:1.35;z-index:20}
#tooltip .tip-id{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#93c5fd;margin-bottom:4px}
#tooltip .tip-raw{white-space:normal}
#hud{position:absolute;right:22px;bottom:22px;display:flex;gap:10px;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s ease}
body.show-metar-hud #hud{opacity:1;pointer-events:auto}
.hud-btn{appearance:none;border:1px solid rgba(148,163,184,.45);background:rgba(2,6,23,.72);color:#e5eefc;border-radius:12px;padding:10px 14px;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px}
#homePanel{position:absolute;left:22px;bottom:22px;width:246px;background:rgba(2,6,23,.78);border:1px solid rgba(148,163,184,.45);border-radius:14px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:30}
#homeTitle{font-family:'Orbitron',sans-serif;font-size:12px;color:#93c5fd;letter-spacing:1px;margin-bottom:8px;text-align:center}
#homeCompass{width:220px;height:220px;display:block;margin:0 auto}
.compass-ring{fill:rgba(15,23,42,.55);stroke:#64748b;stroke-width:2}
.compass-tick{stroke:rgba(148,163,184,.6);stroke-width:2}
.compass-card{fill:#93c5fd;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;text-anchor:middle}
.compass-arrow{fill:#22c55e;opacity:.95}
.compass-text{fill:#e5eefc;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;text-anchor:middle}
.compass-sub{fill:#cbd5e1;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;text-anchor:middle}
.stale .led-glow,.stale .led-core{animation:staleBlink 1.1s infinite steps(1)}
@keyframes staleBlink{0%,49%{opacity:1}50%,100%{opacity:.22}}
#welcomeOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.86);z-index:50}
#welcomeOverlay.show{display:flex}
#welcomeCard{width:min(92vw,500px);background:rgba(15,23,42,.98);border:1px solid rgba(148,163,184,.35);border-radius:18px;padding:24px;box-shadow:0 18px 40px rgba(0,0,0,.5)}
.welcome-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:800;color:#f8fafc;letter-spacing:2px;margin-bottom:8px}
.welcome-sub{color:#cbd5e1;line-height:1.45;margin-bottom:18px}
.welcome-row{display:flex;gap:10px;align-items:center}
#welcomeInput{flex:1;background:rgba(2,6,23,.95);color:#e5eefc;border:1px solid rgba(148,163,184,.45);border-radius:10px;padding:12px 14px;font-family:'Orbitron',sans-serif;font-size:16px;text-transform:uppercase}
#welcomeBtn{border:1px solid rgba(34,197,94,.45);background:rgba(34,197,94,.14);color:#dcfce7;border-radius:10px;padding:12px 16px;font-family:'Orbitron',sans-serif;font-size:14px;cursor:pointer}
#welcomeError{min-height:18px;color:#fca5a5;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div id="wrap">
  <svg viewBox="0 0 1118 1196" aria-label="Arizona LED map">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
    <g id="map"></g>
    <g id="dots"></g>
    <g id="clocks"></g>
  </svg>
  <div id="tooltip"></div>
  <div id="homePanel">
    <div id="homeTitle">HOME AIRPORT WIND</div>
    <svg id="homeCompass" viewBox="0 0 220 220" aria-label="Home airport wind compass"></svg>
  </div>
  <div id="hud">
    <button id="metarStatusBtn" class="hud-btn" type="button">METAR: STARTING</button>
  </div>
  <div id="welcomeOverlay">
    <div id="welcomeCard">
      <div class="welcome-title">ARIZONA WX MAP</div>
      <div class="welcome-sub">Enter your home airport once. We’ll save it and drop you straight into kiosk mode next time.</div>
      <div class="welcome-row">

function albersAZ(lat,lon){
  const phi=lat*Math.PI/180,lambda=lon*Math.PI/180,phi1=29.5*Math.PI/180,phi2=45.5*Math.PI/180,phi0=34.2*Math.PI/180,lambda0=-111.7*Math.PI/180;
  const n=.5*(Math.sin(phi1)+Math.sin(phi2)),c=Math.cos(phi1)**2+2*n*Math.sin(phi1),rho=Math.sqrt(c-2*n*Math.sin(phi))/n,rho0=Math.sqrt(c-2*n*Math.sin(phi0))/n,theta=n*(lambda-lambda0);
  return{x:rho*Math.sin(theta),y:rho0-rho*Math.cos(theta)};
}

function computeBounds(points){
  const projected=points.map(([lon,lat])=>albersAZ(lat,lon));
  return{
    minX:Math.min(...projected.map(p=>p.x)),
    maxX:Math.max(...projected.map(p=>p.x)),
    minY:Math.min(...projected.map(p=>p.y)),
    maxY:Math.max(...projected.map(p=>p.y))
  };
}

const projBounds=computeBounds(azOutline);
const imageBounds={
  minX:Math.min(...imageOutline.map(p=>p[0])),
  maxX:Math.max(...imageOutline.map(p=>p[0])),
  minY:Math.min(...imageOutline.map(p=>p[1])),
  maxY:Math.max(...imageOutline.map(p=>p[1]))
};

function project(lat,lon){
  const p=albersAZ(lat,lon);
  const nx=(p.x-projBounds.minX)/(projBounds.maxX-projBounds.minX);
  const ny=(p.y-projBounds.minY)/(projBounds.maxY-projBounds.minY);
  return{
    x:imageBounds.minX+nx*(imageBounds.maxX-imageBounds.minX),
    y:imageBounds.maxY-ny*(imageBounds.maxY-imageBounds.minY)
  };
}

function updateHudButtons(){
  document.body.classList.toggle('show-metar-hud',showMetarHud);
  const updatedLabel=lastMetarUpdatedAt
    ? ` • ${new Date(lastMetarUpdatedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC',hour12:false})}Z`

  metarStatusBtn.textContent=lastMetarError
    ? `METAR: ${liveMetarStatus} (${lastMetarError})`
    : `METAR: ${liveMetarStatus}${updatedLabel}`;
}

function drawMap(){
  map.innerHTML='';
  let path='';
  imageOutline.forEach(([x,y],i)=>{path+=`${i===0?'M':'L'} ${x} ${y} `;});
  path+='Z';
  const outline=document.createElementNS('http://www.w3.org/2000/svg','path');
  outline.setAttribute('d',path);
  outline.setAttribute('class','outline');

}

    g.appendChild(glow);

}

function getFallbackMetar(airport){
  return `${airport.id} NO CURRENT METAR`;
}

function extractAirportId(item){
  return String(item.icaoId||item.stationId||item.icaoid||item.icao||item.id||'').toUpperCase();
}

function extractRawMetar(item){
  return item.rawOb||item.raw_text||item.rawText||item.raw||item.metar||'';
}

function parseObsTime(record){
  const candidates = [
    record.obsTime,
    record.observation_time,
    record.reportTime,
    record.report_time,
    record.obsTimeUtc
  ].filter(Boolean);

  for (const value of candidates) {
    const d = new Date(value);
    if (!Number.isNaN(d.getTime())) {
      return d;
    }
  }

  const raw = record.rawOb || record.raw_text || record.rawText || record.raw || '';
  const m = String(raw).match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
  if (m) {
    const now = new Date();
    const d = new Date(Date.UTC(
      now.getUTCFullYear(),
      now.getUTCMonth(),
      Number(m[1]),
      Number(m[2]),
      Number(m[3]),
      0
    ));

    if (d.getTime() > now.getTime() + 6 * 3600000) {
      d.setUTCMonth(d.getUTCMonth() - 1);
    }

    return d;
  }

  return null;
}

function isStaleObs(obsDate){
  if (!obsDate) return false;

  const ageMs = Date.now() - obsDate.getTime();

  if (ageMs < 0) return false;
  if (ageMs > 36 * 3600000) return false;

  return ageMs > 150 * 60 * 1000;
}

  

function extractWind(record){
  const dir=record.wdir!==undefined?record.wdir:(record.windDir!==undefined?record.windDir:record.wind_direction);
  const speed=record.wspd!==undefined?record.wspd:(record.windSpeed!==undefined?record.windSpeed:record.wind_speed_kt);
  const gust=record.wgst!==undefined?record.wgst:(record.windGust!==undefined?record.windGust:record.wind_gust_kt);
  return{dir,speed,gust};
}

function showTooltip(airportId,clientX,clientY){
  const airport=airports.find(a=>a.id===airportId);
  if(!airport) return;

  const raw=metarById.get(airportId)||getFallbackMetar(airport);
  const record=metarRecordById.get(airportId);
  const category=record?(record.fltCat||record.flightCategory||record.flight_category||airport.cat):airport.cat;
  const visibility=record&&(record.visib||record.visibility||record.vis||record.prevail_vis_sm);
  const temp=record&&(record.temp!==undefined?record.temp:record.tempC);
  const clouds=record&&Array.isArray(record.clouds)&&record.clouds.length?record.clouds[0]:null;
  const decodedParts=[category];
  if (airport.obsDate instanceof Date && !isNaN(airport.obsDate.getTime())) {
  const ageMs = Date.now() - airport.obsDate.getTime();
  if (ageMs >= 0 && ageMs <= 24 * 60 * 60 * 1000) {
    const ageMin = Math.round(ageMs / 60000);
    decodedParts.push(`${ageMin}m old`);
  }
}

  if(visibility) decodedParts.push(`${visibility}SM`);
  if(clouds&&(clouds.cover||clouds.base)) decodedParts.push(`${clouds.cover||''}${clouds.base||''}`);
  if(temp!==undefined&&temp!==null&&temp!=='') decodedParts.push(`${temp}°C`);
  if(airport.stale) decodedParts.push('STALE');

  const decoded=record?decodedParts.join(' • '):(airport.stale?`${airport.cat} • STALE`:'');

  tooltip.innerHTML=`<div class="tip-id">${airportId}</div>${decoded?`<div class="tip-raw">${decoded}</div>`:''}<div class="tip-raw">${raw}</div>`;
  tooltip.style.display='block';

  const margin=14;
  const wrapRect=document.getElementById('wrap').getBoundingClientRect();
  const tipRect=tooltip.getBoundingClientRect();

  let left=clientX-wrapRect.left+margin;
  let top=clientY-wrapRect.top+margin;

  if(left+tipRect.width>wrapRect.width-margin) left=clientX-wrapRect.left-tipRect.width-margin;
  if(top+tipRect.height>wrapRect.height-margin) top=clientY-wrapRect.top-tipRect.height-margin;

  left=Math.max(margin,left);
  top=Math.max(margin,top);

  tooltip.style.left=`${left}px`;
  tooltip.style.top=`${top}px`;
}

function hideTooltip(){ tooltip.style.display='none'; }

function attachTooltipHandlers(){
  dots.querySelectorAll('g[data-airport-id]').forEach(node=>{
    node.addEventListener('mouseenter',e=>showTooltip(node.dataset.airportId,e.clientX,e.clientY));
    node.addEventListener('mousemove',e=>showTooltip(node.dataset.airportId,e.clientX,e.clientY));
    node.addEventListener('mouseleave',hideTooltip);
  });
}

function drawHomeCompass(){
  homeCompass.innerHTML='';
  const recordAgeMin = (() => {
  const airport = airports.find(a => a.id === homeAirportId);
  if (!airport || !airport.obsDate) return null;

  const obs = airport.obsDate;
  if (!(obs instanceof Date) || isNaN(obs.getTime())) return null;

  const ageMs = Date.now() - obs.getTime();

  if (ageMs < 0) return null;
  if (ageMs > 24 * 60 * 60 * 1000) return null;

  return Math.round(ageMs / 60000);
})();

homeTitle.textContent = recordAgeMin === null
  ? 'HOME AIRPORT WIND'
  : `HOME AIRPORT WIND - UPDATED ${recordAgeMin} MIN${recordAgeMin === 1 ? '' : 'S'} AGO`;

  const cx=110,cy=110,r=84;

  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',cx);
  ring.setAttribute('cy',cy);
  ring.setAttribute('r',r);
  ring.setAttribute('class','compass-ring');
  homeCompass.appendChild(ring);

  [['N',0],['E',90],['S',180],['W',270]].forEach(([label,deg])=>{
    const rad=(deg-90)*Math.PI/180;
    const tx=cx+Math.cos(rad)*(r-14);
    const ty=cy+Math.sin(rad)*(r-14)+4;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',tx);
    t.setAttribute('y',ty);
    t.setAttribute('class','compass-card');
    t.textContent=label;
    homeCompass.appendChild(t);
  });

  for(let deg=0;deg<360;deg+=30){
    const rad=(deg-90)*Math.PI/180;
    const x1=cx+Math.cos(rad)*(r-8);
    const y1=cy+Math.sin(rad)*(r-8);
    const x2=cx+Math.cos(rad)*(r-2);
    const y2=cy+Math.sin(rad)*(r-2);
    const tick=document.createElementNS('http://www.w3.org/2000/svg','line');
    tick.setAttribute('x1',x1);
    tick.setAttribute('y1',y1);
    tick.setAttribute('x2',x2);
    tick.setAttribute('y2',y2);
    tick.setAttribute('class','compass-tick');
    homeCompass.appendChild(tick);
  }

  const airport=airports.find(a=>a.id===homeAirportId);
  const record=metarRecordById.get(homeAirportId);

  const title=document.createElementNS('http://www.w3.org/2000/svg','text');
  title.setAttribute('x',cx);
  title.setAttribute('y',20);
  title.setAttribute('class','compass-text');
  title.textContent=homeAirportId||'----';
  homeCompass.appendChild(title);

  if(!airport||!record){
    const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x',cx);
    sub.setAttribute('y',cy+6);
    sub.setAttribute('class','compass-sub');
    sub.textContent='NO WIND DATA';
    homeCompass.appendChild(sub);
    return;
  }

  const {dir,speed,gust}=extractWind(record);

  if(dir===undefined||dir===null||speed===undefined||speed===null||dir==='VRB'){
    const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x',cx);
    sub.setAttribute('y',cy+6);
    sub.setAttribute('class','compass-sub');
    sub.textContent=dir==='VRB'?`VRB ${speed||''}KT`:'NO WIND DATA';
    homeCompass.appendChild(sub);
    return;
  }

  const deg=Number(dir);
  const arrowRad=(deg-90)*Math.PI/180;
  const tipX=cx+Math.cos(arrowRad)*(r-22);
  const tipY=cy+Math.sin(arrowRad)*(r-22);
  const baseX=cx-Math.cos(arrowRad)*18;
  const baseY=cy-Math.sin(arrowRad)*18;
  const leftRad=arrowRad+Math.PI/2;
  const rightRad=arrowRad-Math.PI/2;
  const leftX=baseX+Math.cos(leftRad)*10;
  const leftY=baseY+Math.sin(leftRad)*10;
  const rightX=baseX+Math.cos(rightRad)*10;
  const rightY=baseY+Math.sin(rightRad)*10;

  const arrow=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  arrow.setAttribute('points',`${tipX},${tipY} ${leftX},${leftY} ${rightX},${rightY}`);
  arrow.setAttribute('class','compass-arrow');
  homeCompass.appendChild(arrow);

  const text=document.createElementNS('http://www.w3.org/2000/svg','text');
  text.setAttribute('x',cx);
  text.setAttribute('y',cy+52);
  text.setAttribute('class','compass-text');
  text.textContent=`${String(dir).padStart(3,'0')}° ${speed}KT${gust?` G${gust}`:''}`;
  homeCompass.appendChild(text);

  const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
  sub.setAttribute('x',cx);
  sub.setAttribute('y',cy+72);
  sub.setAttribute('class','compass-sub');
  sub.textContent=airport.stale?'STALE METAR':'LIVE WIND';
  homeCompass.appendChild(sub);
}

async function fetchMetars(){
  const url=`./metars.json?t=${Date.now()}`;
  liveMetarStatus='FETCHING';
  lastMetarError='';
  updateHudButtons();

  try{
    const response=await fetch(url,{cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);

    const payload=await response.json();
    const data=Array.isArray(payload)?payload:(Array.isArray(payload.data)?payload.data:null);
    if(!data) throw new Error('BAD SHAPE');

    metarById.clear();
    metarRecordById.clear();
    airports.forEach(a=>{a.stale=false;});

    data.forEach(item=>{
      const id=extractAirportId(item);
      const raw=extractRawMetar(item);
      const category=item.fltCat||item.flightCategory||item.flight_category;
      if(!id) return;

      const airport=airports.find(a=>a.id===id);

      if(airport&&category&&colors[category]) airport.cat=category;
      if(raw) metarById.set(id,raw);
      metarRecordById.set(id,item);

      if(airport){
  const obs = parseObsTime(item);
  airport.stale = isStaleObs(obs);
  airport.obsDate = obs;
}
    });

    liveMetarStatus=metarById.size?`CACHE ${metarById.size}`:'NO RAW';
    lastMetarUpdatedAt=new Date().toISOString();

    drawDots();
    drawHomeCompass();
    drawClocks();
    updateHudButtons();
  }catch(error){
    liveMetarStatus='FALLBACK';
    lastMetarError=error.message||'UNKNOWN';
    lastMetarUpdatedAt=null;
    updateHudButtons();
    console.error('Cached METAR load failed',error);
  }
}

function draw(){
  drawMap();
  drawDots();
  drawClocks();
  drawHomeCompass();
}

function stopIntervals(){
  if(clockIntervalId) clearInterval(clockIntervalId);
  if(metarIntervalId) clearInterval(metarIntervalId);
  clockIntervalId=null;
  metarIntervalId=null;
}

function startApp(){
  welcomeOverlay.classList.remove('show');
  draw();
  fetchMetars();
  stopIntervals();
  clockIntervalId=setInterval(drawClocks,1000);
  metarIntervalId=setInterval(fetchMetars,5*60*1000);
}

function initWelcome(){
  if(!homeAirportId) welcomeOverlay.classList.add('show');
  else startApp();
}

welcomeBtn.addEventListener('click',()=>{
  const val=welcomeInput.value.trim().toUpperCase();
  if(!airports.some(a=>a.id===val)){
    welcomeError.textContent='Enter a valid Arizona airport from this map';
    return;
  }
  homeAirportId=val;
  localStorage.setItem('homeAirportId',val);
  welcomeError.textContent='';
  startApp();
});

welcomeInput.addEventListener('keydown',e=>{
  if(e.key==='Enter') welcomeBtn.click();
});

document.addEventListener('keydown',async e=>{
  if(e.target===welcomeInput) return;

  if(e.key==='m'||e.key==='M'){
    showMetarHud=!showMetarHud;
    updateHudButtons();
  }

  if(e.key==='f'||e.key==='F'){
    try{
      if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    }catch(err){
      console.warn(err);
    }
  }

  if(e.key==='k'||e.key==='K'){
    kioskMode=!kioskMode;
    document.body.classList.toggle('kiosk',kioskMode);
  }

  if(e.key==='Escape'&&kioskMode){
    kioskMode=false;
    document.body.classList.remove('kiosk');
  }
});

initWelcome();
</script>
