<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arizona LED Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap');
  html, body { width: 100%; height: 100%; }
  body { margin: 0; background: #0b1220; color: #fff; font-family: sans-serif; overflow: hidden; }
  body.kiosk { cursor: none; }
  #wrap { width: 100vw; height: 100vh; position: relative; }
  svg { width: 100%; height: 100%; background: #020617; display: block; }
  .led-core { stroke: #000; stroke-width: 0.5; transition: fill .45s ease, opacity .45s ease, r .45s ease; }
  .led-glow { filter: url(#glow); opacity: 0.9; transition: fill .6s ease, opacity .6s ease, r .6s ease; }
  @keyframes flicker {
    0% { opacity: 0.85; }
    50% { opacity: 1; }
    100% { opacity: 0.9; }
  }
  .flicker { animation: flicker 2s infinite ease-in-out; }
  .outline { fill: none; stroke: #64748b; stroke-width: 3; vector-effect: non-scaling-stroke; }
  .label { fill: #e5eefc; font-size: 20px; font-weight: 700; paint-order: stroke; stroke: #020617; stroke-width: 4px; stroke-linejoin: round; }
  .label-small { font-size: 16px; }
  .clock-box { fill: rgba(2,6,23,0.78); stroke: #64748b; stroke-width: 2; }
  .clock-title { fill: #93c5fd; font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  .clock-time { fill: #f8fafc; font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 2px; }
  .clock-sub { fill: #cbd5e1; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
  #tooltip { position: absolute; display: none; pointer-events: none; max-width: 360px; background: rgba(2,6,23,0.96); color: #e5eefc; border: 1px solid #64748b; border-radius: 10px; padding: 10px 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.45); font-size: 14px; line-height: 1.35; z-index: 20; }
  #tooltip .tip-id { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; color: #93c5fd; margin-bottom: 4px; }
  #tooltip .tip-raw { white-space: normal; }
  #hud { position: absolute; right: 22px; bottom: 22px; display: flex; gap: 10px; z-index: 30; }
  .hud-btn { appearance: none; border: 1px solid rgba(148,163,184,0.45); background: rgba(2,6,23,0.72); color: #e5eefc; border-radius: 12px; padding: 10px 14px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .hud-btn:hover { background: rgba(15,23,42,0.92); }
  body.kiosk #hud { opacity: 0.18; transition: opacity .2s ease; }
  body.kiosk #hud:hover { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
  <svg viewBox="0 0 1118 1196" aria-label="Arizona LED map">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
    <g id="map"></g>
    <g id="dots"></g>
    <g id="clocks"></g>
  </svg>
  <div id="tooltip"></div>
  <div id="hud">
    <button id="metarStatusBtn" class="hud-btn" type="button">METAR: STARTING</button>
    
  </div>
</div>

    ]]

const azOutline = azGeoJSON.geometry.coordinates[0];

function albersAZ(lat, lon) {
  const phi = lat * Math.PI / 180;
  const lambda = lon * Math.PI / 180;
  const phi1 = 29.5 * Math.PI / 180;
  const phi2 = 45.5 * Math.PI / 180;
  const phi0 = 34.2 * Math.PI / 180;
  const lambda0 = -111.7 * Math.PI / 180;

  const n = 0.5 * (Math.sin(phi1) + Math.sin(phi2));
  const c = Math.cos(phi1) ** 2 + 2 * n * Math.sin(phi1);
  const rho = Math.sqrt(c - 2 * n * Math.sin(phi)) / n;
  const rho0 = Math.sqrt(c - 2 * n * Math.sin(phi0)) / n;
  const theta = n * (lambda - lambda0);

  return { x: rho * Math.sin(theta), y: rho0 - rho * Math.cos(theta) };
}

function computeBounds(points) {
  const projected = points.map(([lon, lat]) => albersAZ(lat, lon));
  return {
    minX: Math.min(...projected.map(p => p.x)),
    maxX: Math.max(...projected.map(p => p.x)),
    minY: Math.min(...projected.map(p => p.y)),
    maxY: Math.max(...projected.map(p => p.y))
  };
}

const projBounds = computeBounds(azOutline);
const imageBounds = {
  minX: Math.min(...imageOutline.map(p => p[0])),
  maxX: Math.max(...imageOutline.map(p => p[0])),
  minY: Math.min(...imageOutline.map(p => p[1])),
  maxY: Math.max(...imageOutline.map(p => p[1]))
};

function project(lat, lon) {
  const p = albersAZ(lat, lon);
  const nx = (p.x - projBounds.minX) / (projBounds.maxX - projBounds.minX);
  const ny = (p.y - projBounds.minY) / (projBounds.maxY - projBounds.minY);
  return {
    x: imageBounds.minX + nx * (imageBounds.maxX - imageBounds.minX),
    y: imageBounds.maxY - ny * (imageBounds.maxY - imageBounds.minY)
  };
}

function drawMap() {
  map.innerHTML = '';
  let path = '';
  imageOutline.forEach(([x, y], i) => {
    path += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
  });
  path += 'Z';
  const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  outline.setAttribute('d', path);
  outline.setAttribute('class', 'outline');
  map.appendChild(outline);
}

function drawDots() {
  dots.innerHTML = '';
  const denseIds = new Set(['KPHX','KDVT','KSDL','KFFZ','KCHD','KGEU','KLUF','KGYR','KIWA','KRYN','KCGZ']);

  airports.forEach(a => {
    const p = project(a.lat, a.lon);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'flicker');
    g.setAttribute('data-airport-id', a.id);
    g.style.pointerEvents = 'all';

    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    glow.setAttribute('cx', p.x);
    glow.setAttribute('cy', p.y);
    glow.setAttribute('r', 14);
    glow.setAttribute('fill', colors[a.cat] || colors.VFR);
    glow.setAttribute('class', 'led-glow');

    const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    core.setAttribute('cx', p.x);
    core.setAttribute('cy', p.y);
    core.setAttribute('r', 5);
    core.setAttribute('fill', colors[a.cat] || colors.VFR);
    core.setAttribute('class', 'led-core');

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', p.x + (a.dx || 10));
    label.setAttribute('y', p.y + (a.dy || -10));
    if (a.center || (a.dx || 0) === 0) label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', denseIds.has(a.id) ? 'label label-small' : 'label');
    label.textContent = a.id;

    g.appendChild(glow);
    g.appendChild(core);
    dots.appendChild(g);
    dots.appendChild(label);
  });

  attachTooltipHandlers();
}

    ? new Date(lastMetarUpdatedAt).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC', hour12: false }) + 'Z'

function getFallbackMetar(airport) {
  return `${airport.id} ${airport.cat} DEMO DATA`;
}

function extractAirportId(item) {
  return String(item.icaoId || item.stationId || item.icaoid || item.icao || item.id || '').toUpperCase();
}

function extractRawMetar(item) {
  return item.rawOb || item.raw_text || item.rawText || item.raw || item.metar || '';
}

function showTooltip(airportId, clientX, clientY) {
  const airport = airports.find(a => a.id === airportId);
  if (!airport) return;
  const raw = metarById.get(airportId) || getFallbackMetar(airport);
  const record = metarRecordById.get(airportId);
  const category = record ? (record.fltCat || record.flightCategory || record.flight_category || airport.cat) : airport.cat;
  const visibility = record && (record.visib || record.visibility || record.vis || record.prevail_vis_sm);
  const temp = record && (record.temp !== undefined ? record.temp : record.tempC);
  const clouds = record && Array.isArray(record.clouds) && record.clouds.length ? record.clouds[0] : null;
  const decodedParts = [category];
  if (visibility) decodedParts.push(`${visibility}SM`);
  if (clouds && (clouds.cover || clouds.base)) decodedParts.push(`${clouds.cover || ''}${clouds.base || ''}`);
  if (temp !== undefined && temp !== null && temp !== '') decodedParts.push(`${temp}°C`);
  const decoded = record ? decodedParts.join(' • ') : '';

  tooltip.innerHTML = `<div class="tip-id">${airportId}</div>${decoded ? `<div class="tip-raw">${decoded}</div>` : ''}<div class="tip-raw">${raw}</div>`;
  tooltip.style.display = 'block';

  const margin = 14;
  const wrapRect = document.getElementById('wrap').getBoundingClientRect();
  const tipRect = tooltip.getBoundingClientRect();

  let left = clientX - wrapRect.left + margin;
  let top = clientY - wrapRect.top + margin;

  if (left + tipRect.width > wrapRect.width - margin) {
    left = clientX - wrapRect.left - tipRect.width - margin;
  }
  if (top + tipRect.height > wrapRect.height - margin) {
    top = clientY - wrapRect.top - tipRect.height - margin;
  }

  left = Math.max(margin, left);
  top = Math.max(margin, top);

  tooltip.style.left = `${left}px`;
  tooltip.style.top = `${top}px`;
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function attachTooltipHandlers() {
  dots.querySelectorAll('g[data-airport-id]').forEach(node => {
    node.addEventListener('mouseenter', event => showTooltip(node.getAttribute('data-airport-id'), event.clientX, event.clientY));
    node.addEventListener('mousemove', event => showTooltip(node.getAttribute('data-airport-id'), event.clientX, event.clientY));
    node.addEventListener('mouseleave', hideTooltip);
  });
}

function updateHudButtons() {
  if (fullscreenBtn) fullscreenBtn.textContent = document.fullscreenElement ? 'EXIT FULL' : 'FULLSCREEN';
  if (kioskBtn) kioskBtn.textContent = kioskMode ? 'EXIT KIOSK' : 'KIOSK';
  const updatedLabel = lastMetarUpdatedAt
    ? ` • ${new Date(lastMetarUpdatedAt).toLocaleTimeString('en-GB', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        timeZone: 'UTC',
        hour12: false
      })}Z`
    : '';
  metarStatusBtn.textContent = lastMetarError
    ? `METAR: ${liveMetarStatus} (${lastMetarError})`
    : `METAR: ${liveMetarStatus}${updatedLabel}`;
})}Z`
    : '';
  metarStatusBtn.textContent = lastMetarError
    ? `METAR: ${liveMetarStatus} (${lastMetarError})`
    : `METAR: ${liveMetarStatus}${updatedLabel}`;
}

async function toggleFullscreen() {
  try {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
    else await document.exitFullscreen();
  } catch (error) {
    console.warn('Fullscreen toggle failed.', error);
  }
  updateHudButtons();
}

function setKioskMode(enabled) {
  kioskMode = enabled;
  document.body.classList.toggle('kiosk', kioskMode);
  updateHudButtons();
}

async function toggleKioskMode() {
  const next = !kioskMode;
  setKioskMode(next);
  if (next && !document.fullscreenElement) await toggleFullscreen();
}

async function fetchMetars() {
  const url = `./metars.json?t=${Date.now()}`;
  liveMetarStatus = 'FETCHING';
  lastMetarError = '';
  updateHudButtons();

  try {
    const response = await fetch(url, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();
    let payload;
    try {
      payload = JSON.parse(text);
    } catch (parseError) {
      console.warn('metars.json was not valid JSON:', text.slice(0, 400));
      throw new Error('BAD JSON');
    }

    const data = Array.isArray(payload) ? payload : (Array.isArray(payload.data) ? payload.data : null);
    if (!data) {
      console.warn('Unexpected metars.json payload shape:', payload);
      throw new Error('BAD SHAPE');
    }

    metarById.clear();
    metarRecordById.clear();

    data.forEach(item => {
      const id = extractAirportId(item);
      const raw = extractRawMetar(item);
      const category = item.fltCat || item.flightCategory || item.flight_category;
      if (!id) return;
      const airport = airports.find(a => a.id === id);
      if (airport && category && colors[category]) airport.cat = category;
      if (raw) metarById.set(id, raw);
      metarRecordById.set(id, item);
    });

    liveMetarStatus = metarById.size ? `CACHE ${metarById.size}` : 'NO RAW';
    lastMetarUpdatedAt = new Date().toISOString();
    if (!metarById.size && data.length) console.log('METAR sample payload:', data[0]);

    try {
      drawDots();
    } catch (renderError) {
      console.error('drawDots failed after cached METAR load:', renderError);
      throw new Error(`DRAW ${renderError.message}`);
    }

    updateHudButtons();
  } catch (error) {
    liveMetarStatus = 'FALLBACK';
    lastMetarError = (error && error.message) ? error.message : 'UNKNOWN';
    lastMetarUpdatedAt = null;
    updateHudButtons();
    console.warn('Cached METAR load failed; using fallback tooltip text.', error);
  }
}

function assert(condition, message) {
  if (!condition) throw new Error(message);
}

function runTests() {
  assert(azGeoJSON.type === 'Feature', 'Arizona geometry should be wrapped as a GeoJSON Feature');
  assert(azGeoJSON.geometry.type === 'Polygon', 'Arizona GeoJSON geometry should be a Polygon');
  assert(Array.isArray(imageOutline) && imageOutline.length > 50, 'Image outline should contain enough traced points');
  assert(Array.isArray(azOutline) && azOutline.length > 40, 'Geo outline should contain enough georeference points');
  assert(airports.length >= 25, 'Expected a broader Arizona METAR airport list');

  const phoenix = project(33.44, -112.01);
  assert(Number.isFinite(phoenix.x) && Number.isFinite(phoenix.y), 'Projected Phoenix coordinates should be finite');
  assert(phoenix.x >= imageBounds.minX && phoenix.x <= imageBounds.maxX, 'Projected Phoenix x should land inside image bounds');
  assert(phoenix.y >= imageBounds.minY && phoenix.y <= imageBounds.maxY, 'Projected Phoenix y should land inside image bounds');

  drawMap();
  drawDots();
  drawClocks();
  assert(map.children.length === 1, 'Map layer should contain one outline path');
  assert(dots.children.length === airports.length * 2, 'Dot layer should contain one dot group and one label per airport');
  assert(clocks.children.length === 1, 'Clock layer should contain one clock panel group');
  assert(typeof showTooltip === 'function' && typeof hideTooltip === 'function', 'Tooltip handlers should exist');
  assert(typeof toggleFullscreen === 'function' && typeof toggleKioskMode === 'function', 'Kiosk controls should exist');
  assert(typeof extractAirportId === 'function' && typeof extractRawMetar === 'function', 'METAR parsing helpers should exist');
}

function initializeApp() {
  try {
    runTests();
  } catch (error) {
    console.error('runTests failed:', error);
    liveMetarStatus = 'TEST ERR';
    lastMetarError = error.message || 'UNKNOWN';
  }

  try {
    draw();
  } catch (error) {
    console.error('draw failed:', error);
    liveMetarStatus = 'DRAW ERR';
    lastMetarError = error.message || 'UNKNOWN';
  }

  updateHudButtons();
  fetchMetars();
  setInterval(drawClocks, 1000);
  setInterval(fetchMetars, 5 * 60 * 1000);
}

function draw() {
  drawMap();
  drawDots();
  drawClocks();
}

if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);
if (kioskBtn) kioskBtn.addEventListener('click', toggleKioskMode);
document.addEventListener('fullscreenchange', updateHudButtons);
document.addEventListener('keydown', async (event) => {
  if (event.key === 'f' || event.key === 'F') {
    event.preventDefault();
    await toggleFullscreen();
  }
  if (event.key === 'k' || event.key === 'K') {
    event.preventDefault();
    await toggleKioskMode();
  }
  if (event.key === 'Escape' && kioskMode) {
    setKioskMode(false);
  }
});

initializeApp();
</script>
</body>
</html>
